# descended_from: someone named only as an (often vague) descendant of `ancestor_id`.
#   Drawn as a phantom youngest child of the ancestor (solid line), but placed on
#   the generation row of `mentioned_with` — the figure during whose story they appear.
#   e.g. {person_id: 劉累, ancestor_id: 帝堯, mentioned_with: 夏孔甲帝}
descended_from:
  - {person_id: 劉累, ancestor_id: 帝堯, mentioned_with: 夏孔甲}
  - {person_id: 女修, ancestor_id: 帝顓頊}                       # unclear -> direct youngest child
  - {person_id: 趙衰, ancestor_id: 造父}                         # unclear -> direct youngest child
  - {person_id: 費昌, ancestor_id: 若木, depth: 4}               # 玄孫
  - {person_id: 孟戲, ancestor_id: 大廉, depth: 4}               # 玄孫
  - {person_id: 中衍, ancestor_id: 大廉, depth: 4}               # 玄孫
  - {person_id: 中潏, ancestor_id: 中衍, depth: 4}               # 玄孫
  - {person_id: 女華, ancestor_id: 少典}                         # 少典之子，嫁大業 (married-in，虛線連少典)
  - {person_id: 漢太上皇, ancestor_id: 劉累, mentioned_with: 秦公子嬰, order: 1}   # 劉累之裔(其一，右支)，與子嬰同世
  - {person_id: 劉賈, ancestor_id: 劉累, mentioned_with: 漢高祖, order: 2}         # 劉累之裔(其二，左支)，與高祖同世
  - {person_id: 隆慮侯蟜, ancestor_id: 漢孝景帝, depth: 2}                          # 景帝之孫 (David)

# siblings: parentless sibling groups (Shiji names them as siblings but their shared parent is
#   not a tile here). Each list is ELDEST FIRST. If one member married into the tree, the others
#   attach beside that spouse's partner; a stub-less sibling busbar ties the group. (rule Sib)
siblings:
  # 呂氏五同胞 (eldest→youngest)；anchor 呂太后 嫁漢高祖。呂悼武王/建成侯/臨光侯各有子孫
  - [呂悼武王, 建成侯呂釋之, 呂太后, 臨光侯呂媭, 扶柳侯呂平]
  - [薄后, 薄昭]                       # 薄后 嫁漢孝文帝; 薄昭其弟
  - [王太后, 武安侯王蚡, 周陽侯王勝]    # 王太后 嫁漢孝景帝; 王蚡/王勝其弟

# layer_order: manual LEFT-TO-RIGHT ordering for a generation row (rule LO). Overrides the auto x
#   for the listed tiles, anchored on the listed tile with the largest subtree. David sets these
#   to hand-arrange the dense 漢-外戚 rows; connectors to the next row stretch until it is ordered.
layer_order:
