# 史記 family tree — genealogy data (the ONLY thing you hand-edit as you read).
#
# CONVENTION: every Chinese character — both `id` and `name` — is TRADITIONAL (繁體).
# id  : stable, unique handle == the Chinese name. Frozen once assigned.
#       Disambiguate a true name-clash with a suffix, e.g. 共伯-衛 / 共伯-某.
# Parent links live on the CHILD: father_id / mother_id / birth_order.
#   birth_order: 1 = eldest among the anchor parent's children.
#   mother_id  : must point to a NAMED record, or be omitted.
# colors / chapters are yours to add later; omit color to use the default fill.
# `# ...` comments are free — annotate chapters, quotes, and doubts inline.

